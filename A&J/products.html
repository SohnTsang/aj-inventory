<!doctype html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-1G8W933880"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-1G8W933880'); </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Products — A&J HAKKO</title>
  <link rel="stylesheet" href="./subpage.css?v=3">
  <link rel="stylesheet" href="./styles.css?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header solid2" role="banner">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="A and J Logistics home">
        <img class="brand-logo" src="/images/A&J Logo white-min.png" alt="A&J Logistics" />
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-list">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
        <ul id="nav-list" class="nav-list">
          <li><a data-i18n="nav.home" href="/">Home</a></li>
          <li><a data-i18n="nav.about" href="/company">About Us</a></li>
          <li><a data-i18n="nav.services" href="/#services">Our Services</a></li>
          <li><a data-i18n="nav.products" href="/#products">Our Products</a></li>
          <li><a data-i18n="nav.news" href="/news">News</a></li>
          <li><a data-i18n="nav.contact" href="/#location">Contact</a></li>
        </ul>
      </nav>
      <div class="lang-switch" aria-label="Language selector">
        <button class="lang-btn" data-lang="jp" aria-pressed="false">
          <span class="flag-circle" aria-hidden="true"><img src="/images/jp.svg" width="20" height="15" alt="Japan" /></span>
          <span class="label">JP</span>
        </button>
        <button class="lang-btn" data-lang="en" aria-pressed="true">
          <span class="flag-circle" aria-hidden="true"><img src="/images/sg.svg" width="20" height="15" alt="Singapore" /></span>
          <span class="label">SG</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="services-hero">
      <div class="hero-mesh"></div>
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title" data-animate="fade-up" data-delay="100">
            <span data-i18n="products.hero.title">Premium Japanese Products</span>
          </h1>
        </div>
      </div>
      <div class="hero-bottom-accent"></div>
    </section>

    <section class="section" style="padding-top: 60px">
      <div class="container">
        <div id="product-list" class="products-grid" style="display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 24px !important;"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container" style="text-align: center; padding: 20px 0;">
      <div style="margin-bottom: 16px;">
        <div class="lang-switch small" style="justify-content: center;">
          <button class="lang-btn" data-lang="jp" aria-pressed="false">
            <span class="flag-circle"><img src="./images/jp.svg" width="20" height="15" alt="Japan" /></span>
            <span class="label">JP</span>
          </button>
          <button class="lang-btn" data-lang="en" aria-pressed="true">
            <span class="flag-circle"><img src="./images/sg.svg" width="20" height="15" alt="Singapore" /></span>
            <span class="label">SG</span>
          </button>
        </div>
      </div>
      <div>
        <span>© 2025 A&J HAKKO PTE LTD | 201120019N</span>
      </div>
    </div>
  </footer>

  <script src="./script.js" defer></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig } from "/firebase-config.js";
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const grid = document.getElementById('product-list');
    const q = query(collection(db,'products'), where('published','==', true), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    grid.innerHTML = snap.docs.map(d => {
      const p = d.data();
      // Use thumbnail for grid view (much smaller file size)
      const img = p.thumbUrl || p.imageUrl;
      return `
      <article class="products-page-card" onclick="window.location.href='/product-detail.html?id=${encodeURIComponent(d.id)}'" style="cursor: pointer;">
        ${img ? `<img src="${img}" alt="" loading="lazy" decoding="async">` : ''}
        <h4>${p.name||''}</h4>
      </article>`;
    }).join('') || '<p>No products yet.</p>';
  </script>
</body></html>
