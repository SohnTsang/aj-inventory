<html lang="en">
<head>
  <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-1G8W933880"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-1G8W933880'); </script>
  <meta charset="utf-8">

  <link rel="stylesheet" href="./subpage.css?v=1">
  <link rel="stylesheet" href="./styles.css?v=3">

  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
  <style>
    .section { padding-block: clamp(56px, 8vw, 56px); }
    .news-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .news-grid { display: grid; gap: 16px; position: relative; }
    .news-card {
      background: white; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease; position: relative;
      display: grid; grid-template-columns: 200px 1fr auto; gap: 20px;
      align-items: center; padding: 16px; min-height: 140px;
      border: 1px solid rgba(190, 224, 236, 0.15);
    }
    .news-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08); border-color: rgba(190, 224, 236, 0.3); }
    .news-card:first-child { background: linear-gradient(135deg, #f8fafb 0%, #ffffff 100%); padding: 20px; margin-bottom: 8px; }
    
    /* Adaptive image container - shows full image */
    .news-image { 
      width: 200px; 
      height: 120px; 
      overflow: hidden; 
      background: linear-gradient(135deg, #f0f4f8 0%, #e8eef3 100%); 
      flex-shrink: 0; 
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .news-image img { 
      max-width: 100%; 
      max-height: 100%; 
      width: auto;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s ease; 
      border-radius: 4px;
    }
    .news-card:hover .news-image img { transform: scale(1.05); }
    
    .news-content { flex: 1; min-width: 0; }
    .news-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .news-date { color: #6b7280; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .news-date::before { content: ''; width: 4px; height: 4px; background: #bee0ec; border-radius: 50%; }
    .news-badge { background: rgba(15, 60, 76, 0.1); color: #0f3c4c; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .news-card:first-child .news-badge { background: #0f3c4c; color: white; }
    .news-title { font-size: 16px; font-weight: 600; color: #0f3c4c; line-height: 1.3; margin: 0 0 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-card:first-child .news-title { font-size: 18px; }
    .news-excerpt { color: #4a5568; font-size: 13px; line-height: 1.4; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-action { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: #f8fafb; border: 1px solid rgba(190, 224, 236, 0.3); border-radius: 50%; color: #0f3c4c; text-decoration: none; transition: all 0.3s ease; flex-shrink: 0; }
    .news-action:hover { background: #0f3c4c; color: white; border-color: #0f3c4c; transform: scale(1.1); }
    .news-action svg { width: 18px; height: 18px; transition: transform 0.3s ease; }
    .news-action:hover svg { transform: translateX(2px); }
    .load-more-container { display: flex; justify-content: center; margin-top: 24px; }
    #next { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: #0f3c4c; color: white; text-decoration: none; font-weight: 500; font-size: 14px; transition: all 0.3s ease; border: none; cursor: pointer; }
    #next:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(29, 50, 80, 0.2); }
    #next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .loading-state { display: flex; justify-content: center; align-items: center; padding: 40px 0; color: #6b7280; font-size: 14px; }
    .loading-spinner { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-top: 2px solid #0f3c4c; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #0f3c4c; }
    .empty-state p { font-size: 14px; margin: 0; }
    
    @media (max-width: 1024px) {
      .news-card { grid-template-columns: 160px 1fr auto; gap: 16px; padding: 14px; min-height: 120px; }
      .news-image { width: 160px; height: 100px; }
      .news-title { font-size: 15px; }
      .news-card:first-child .news-title { font-size: 16px; }
    }
    @media (max-width: 768px) {
      .news-container { padding: 0 16px; }
      .news-card { grid-template-columns: 1fr; gap: 12px; padding: 16px; min-height: auto; }
      .news-image { width: 100%; height: 180px; order: -1; }
      .news-content { order: 1; }
      .news-action { order: 2; align-self: flex-start; margin-top: 12px; }
      .news-title { font-size: 16px; margin-bottom: 8px; }
      .news-card:first-child .news-title { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .news-card { padding: 12px; }
      .news-image { height: 160px; }
      .news-title { font-size: 15px; }
      .news-card:first-child .news-title { font-size: 16px; }
      .news-excerpt { font-size: 12px; }
      #next { padding: 10px 20px; font-size: 13px; }
    }
  </style>
</head>
<body>

      <nav class="primary-nav" aria-label="Primary">

  <main>

  <script src="./script.js" defer></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, getDocs, startAfter } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig } from "/firebase-config.js";
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lang = localStorage.getItem('lang') || 'en';
    const listRef = collection(db, 'news');
    let cursor = null;
    let isFirstLoad = true;

    async function load() {
      const base = query(
        listRef,
        where('published', '==', true),
        where('lang', '==', lang),
        orderBy('publishedAt', 'desc'),
        limit(9)
      );
      const q = cursor ? query(base, startAfter(cursor)) : base;
      const snap = await getDocs(q);
      const grid = document.getElementById('news-list');
      
      if (isFirstLoad) {
        grid.innerHTML = '';
        isFirstLoad = false;
      }

      if (snap.docs.length === 0 && grid.children.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3 data-i18n="news.noNewsAvailable">No news available</h3>
            <p data-i18n="news.checkBack">Check back later for the latest updates.</p>
          </div>
        `;
        document.getElementById('next').style.display = 'none';
        return;
      }

      const newsHtml = snap.docs.map((d, index) => {
        const n = d.data();
        const date = n.publishedAt?.toDate ? n.publishedAt.toDate() : (n.publishedAt ? new Date(n.publishedAt) : new Date());
        const cover = n.thumbUrl || n.coverUrl || (Array.isArray(n.thumbUrls) && n.thumbUrls[0]) || (Array.isArray(n.imageUrls) && n.imageUrls[0]) || null;
        const preview = String((n.body || '')).replace(/<[^>]*>/g, '').substring(0, 80) + '...';
        const isFirst = cursor === null && index === 0;

        return `
          <article class="news-card">
            <div class="news-image">
              ${cover ? `<img src="${cover}" alt="${n.title || ''}" loading="lazy" decoding="async">` : ''}
            </div>
            <div class="news-content">
              <div class="news-meta">
                <time class="news-date" datetime="${date.toISOString()}">${date.toLocaleDateString()}</time>
                ${isFirst ? '<span class="news-badge">Latest</span>' : ''}
              </div>
              <h3 class="news-title">${n.title || ''}</h3>
              <p class="news-excerpt">${preview}</p>
            </div>
            <a class="news-action" href="/news/${encodeURIComponent(n.slug)}" aria-label="Read ${n.title || 'article'}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </a>
          </article>
        `;
      }).join('');

      grid.insertAdjacentHTML('beforeend', newsHtml);
      cursor = snap.docs[snap.docs.length - 1] || cursor;
      const next = document.getElementById('next');
      if (next) {
        next.disabled = !snap.docs.length;
        if (!snap.docs.length) next.style.display = 'none';
      }
    }

    document.getElementById('next').addEventListener('click', load);
    load();
  </script>
