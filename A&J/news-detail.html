<!doctype html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-1G8W933880"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-1G8W933880'); </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>News — A&J HAKKO</title>
  <link rel="stylesheet" href="/subpage.css?v=1">
  <link rel="stylesheet" href="/styles.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header solid2" role="banner">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="A and J Logistics home">
        <img class="brand-logo" src="/images/A&J Logo white-min.png" alt="A&J Logistics" />
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-list">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
        <ul id="nav-list" class="nav-list">
          <li><a data-i18n="nav.home" href="/">Home</a></li>
          <li><a data-i18n="nav.about" href="/company">About Us</a></li>
          <li><a data-i18n="nav.services" href="/#services">Our Services</a></li>
          <li><a data-i18n="nav.products" href="/#products">Our Products</a></li>
          <li><a data-i18n="nav.news" href="/news">News</a></li>
          <li><a data-i18n="nav.contact" href="/#location">Contact</a></li>
        </ul>
      </nav>
      <div class="lang-switch" aria-label="Language selector">
        <button class="lang-btn" data-lang="jp" aria-pressed="false">
          <span class="flag-circle" aria-hidden="true"><img src="/images/jp.svg" width="20" height="15" alt="Japan" /></span>
          <span class="label">JP</span>
        </button>
        <button class="lang-btn" data-lang="en" aria-pressed="true">
          <span class="flag-circle" aria-hidden="true"><img src="/images/sg.svg" width="20" height="15" alt="Singapore" /></span>
          <span class="label">SG</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="services-hero">
      <div class="hero-mesh"></div>
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title" data-animate="fade-up" data-delay="100">
            <span data-i18n="news.hero.title">Latest News & Updates</span>
          </h1>
        </div>
      </div>
      <div class="hero-bottom-accent"></div>
    </section>

    <section class="section" style="padding-top: 60px">
      <div class="container">
        <p style="margin-bottom: 24px;"><a class="btn btn-secondary" href="/news">← Back to news</a></p>
        <article id="article" class="article">
          <div id="loading">Loading…</div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container" style="text-align: center; padding: 20px 0;">
      <div style="margin-bottom: 16px;">
        <div class="lang-switch small" style="justify-content: center;">
          <button class="lang-btn" data-lang="jp" aria-pressed="false">
            <span class="flag-circle"><img src="/images/jp.svg" width="20" height="15" alt="Japan" /></span>
            <span class="label">JP</span>
          </button>
          <button class="lang-btn" data-lang="en" aria-pressed="true">
            <span class="flag-circle"><img src="/images/sg.svg" width="20" height="15" alt="Singapore" /></span>
            <span class="label">SG</span>
          </button>
        </div>
      </div>
      <div>
        <span>© 2025 A&J HAKKO PTE LTD | 201120019N</span>
      </div>
    </div>
  </footer>

  <script src="/script.js" defer></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig } from "/firebase-config.js";
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const parts = location.pathname.split('/').filter(Boolean);
    const slug = parts.length >= 2 ? decodeURIComponent(parts[1]) : '';
    const q = query(collection(db,'news'), where('slug','==',slug), where('published','==',true), limit(1));
    const snap = await getDocs(q);
    const el = document.getElementById('article');
    const d = snap.docs[0]?.data();
    if (!d) { el.innerHTML = '<p>Not found.</p>'; throw new Error('Not found'); }
    
    const date = d.publishedAt?.toDate ? d.publishedAt.toDate() : (d.publishedAt ? new Date(d.publishedAt) : new Date());
    
    // Use full-size images for detail view (imageUrls), fallback to coverUrl
    const raw = [];
    if (d.coverUrl) raw.push(d.coverUrl);
    if (Array.isArray(d.imageUrls)) raw.push(...d.imageUrls);
    const images = Array.from(new Set(raw.filter(Boolean))).filter((u) => /^(https?:)?\//.test(String(u)));
    const hasGallery = images.length > 1;
    
    const gallery = hasGallery
      ? `
      <div class="news-gallery">
        <button class="news-gallery-btn prev" aria-label="Previous image">◀</button>
        <div class="news-gallery-viewport">
          <div class="news-gallery-track">
            ${images.map(u => `<div class="news-gallery-slide"><img src="${u}" alt="" loading="lazy" decoding="async"></div>`).join('')}
          </div>
        </div>
        <button class="news-gallery-btn next" aria-label="Next image">▶</button>
      </div>`
      : (images[0] ? `<div class="news-gallery single"><div class="news-gallery-viewport"><div class="news-gallery-track"><div class="news-gallery-slide"><img src="${images[0]}" alt="" loading="lazy" decoding="async"></div></div></div></div>` : '');

    el.innerHTML = `
      ${gallery}
      <h1>${d.title || ''}</h1>
      <div class="meta">${date.toLocaleDateString()}${d.author?` · ${d.author}`:''}</div>
      <div class="content">${(d.body || '').replace(/\\n/g, '<br>').replace(/\n/g, '<br>')}</div>
    `;
    document.title = (d.title || 'News') + ' — News';

    if (hasGallery) {
      const track = document.querySelector('.news-gallery-track');
      const prevBtn = document.querySelector('.news-gallery-btn.prev');
      const nextBtn = document.querySelector('.news-gallery-btn.next');
      if (track && prevBtn && nextBtn) {
        let index = 0;
        function update(){ track.style.transform = `translateX(-${index * 100}%)`; }
        prevBtn.addEventListener('click', () => { index = (index - 1 + images.length) % images.length; update(); });
        nextBtn.addEventListener('click', () => { index = (index + 1) % images.length; update(); });
      }
    }
  </script>
</body>
</html>
